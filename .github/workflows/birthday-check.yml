name: Birthday Check

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC = 8am South Africa time
  workflow_dispatch:      # Allows us to test it MANUALLY right now!

jobs:
  check-birthdays:
    runs-on: ubuntu-latest
    steps:
      - name: Check birthdays and send notifications
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
        run: |
          node << 'EOF'
          const https = require('https');

          const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkT7f-mh_GDS_rmdOf-7LFCWlQom1haqkIKpxNLiqmARUlLrQ88BG9B_tgvNhhrw/pub?gid=48598000&single=true&output=csv";
          const ONESIGNAL_APP_ID = process.env.ONESIGNAL_APP_ID;
          const ONESIGNAL_API_KEY = process.env.ONESIGNAL_API_KEY;

          function fetchURL(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
              }).on('error', reject);
            });
          }

          function parseCSV(txt) {
            return txt.trim().split(/\r?\n/).map(line => {
              const row = []; let cell = '', q = false;
              for (const c of line) {
                if (c === '"') { q = !q; }
                else if (c === ',' && !q) { row.push(cell.trim()); cell = ''; }
                else { cell += c; }
              }
              row.push(cell.trim());
              return row;
            });
          }

          function findCol(headers, names) {
            for (const n of names) {
              const i = headers.findIndex(h => h.toLowerCase() === n.toLowerCase());
              if (i >= 0) return i;
            }
            return -1;
          }

          function parseBirthday(id) {
            if (!id || id.length < 6) return null;
            const digits = id.replace(/\D/g, '');
            if (digits.length < 6) return null;
            let yy = parseInt(digits.substring(0, 2));
            const mm = parseInt(digits.substring(2, 4));
            const dd = parseInt(digits.substring(4, 6));
            if (mm < 1 || mm > 12 || dd < 1 || dd > 31) return null;
            const currentYear = new Date().getFullYear();
            const year = (2000 + yy) > currentYear ? 1900 + yy : 2000 + yy;
            return { month: mm, day: dd, year };
          }

          function sendNotification(title, body) {
            return new Promise((resolve, reject) => {
              const payload = JSON.stringify({
                app_id: ONESIGNAL_APP_ID,
                included_segments: ["Total Subscriptions"],
                headings: { en: title },
                contents: { en: body },
                web_url: "https://lfy-birthday-app.vercel.app"
              });

              const options = {
                hostname: 'onesignal.com',
                path: '/api/v1/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${ONESIGNAL_API_KEY}`
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  console.log('OneSignal Response:', data);
                  resolve(data);
                });
              });
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          async function main() {
            console.log('Checking for birthdays...');
            const csv = await fetchURL(SHEET_URL);
            const rows = parseCSV(csv);
            if (rows.length < 2) return;

            const headers = rows[0].map(h => h.trim());
            const idx = {
              name: findCol(headers, ['P1_Name','p1_name']),
              id: findCol(headers, ['P1_ID','p1_id']),
              cell: findCol(headers, ['P1_Cell','p1_cell']),
              student: findCol(headers, ['StudentName','studentname']),
              cls: findCol(headers, ['Class','class']),
              p2name: findCol(headers, ['P2_Name','p2_name']),
              p2id: findCol(headers, ['P2_ID','p2_id']),
              p2cell: findCol(headers, ['P2_Cell','p2_cell']),
            };

            const now = new Date(new Date().toLocaleString("en-US", { timeZone: "Africa/Johannesburg" }));
            const todayM = now.getMonth() + 1;
            const todayD = now.getDate();
            const seen = new Set();
            let count = 0;

            for (let i = 1; i < rows.length; i++) {
              const row = rows[i];
              for (const [nameIdx, idIdx, cellIdx] of [[idx.name, idx.id, idx.cell], [idx.p2name, idx.p2id, idx.p2cell]]) {
                const id = idIdx >= 0 ? String(row[idIdx]||'').trim() : '';
                const bd = parseBirthday(id);
                if (bd && bd.month === todayM && bd.day === todayD && !seen.has(id)) {
                  seen.add(id);
                  const name = nameIdx >= 0 ? String(row[nameIdx]||'').trim() : '';
                  const phone = cellIdx >= 0 ? String(row[cellIdx]||'').trim() : '';
                  const student = idx.student >= 0 ? String(row[idx.student]||'').trim() : '';
                  const cls = idx.cls >= 0 ? String(row[idx.cls]||'').trim() : '';
                  const age = bd.year ? ` — turns ${now.getFullYear() - bd.year} today! 🎉` : '';
                  const studentStr = student ? ` · Parent of ${student}${cls ? ' ('+cls+')' : ''}` : '';
                  const phoneStr = phone ? ` · 📱 ${phone}` : '';
                  
                  if (name) {
                    await sendNotification(`🎂 ${name}'s Birthday Today!`, `${name}${age}${studentStr}${phoneStr}`);
                    count++;
                  }
                }
              }
            }
            console.log(`Finished. Sent ${count} notification(s).`);
          }

          main().catch(console.error);
          EOF
